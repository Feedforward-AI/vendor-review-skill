<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{{VENDOR}} — Vendor Evaluation Report</title>
<style>
  :root {
    --ink:#1A202C; --body:#4A5568; --muted:#718096;
    --paper:#FFFFFF; --canvas:#F7FAFC;
    --pass:#38A169; --partial:#D69E2E; --fail:#E53E3E; --insufficient:#718096;
    --pass-bg:#F0FFF4; --partial-bg:#FFFAF0; --fail-bg:#FFF5F5; --insufficient-bg:#F7FAFC;
    --rule:#E2E8F0; --rule-strong:#CBD5E0; --header-bg:#EDF2F7;
    --shadow:0 24px 60px rgba(26,32,44,.14);
  }
  /* Dual sizing: larger on screen for reading, faithful DOCX baseline in print. */
  @media screen { :root { font-size: 17px; } }  /* ~1.15x the print baseline */
  @media print  { :root { font-size: 11pt; } }  /* faithful DOCX baseline */

  * { box-sizing: border-box; }
  body { font-family: Calibri, Carlito, "Segoe UI", system-ui, -apple-system, Roboto, Helvetica, Arial, sans-serif;
         color: var(--body); background: var(--canvas); margin: 0; padding: 2rem;
         line-height: 1.55; font-size: 1rem; }

  .report-shell { max-width: 980px; margin: 0 auto; background: var(--paper); border: 1px solid var(--rule);
                  box-shadow: var(--shadow); padding: 3rem; }

  .cover { position: relative; display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 1.5rem;
           border-bottom: 1px solid var(--rule); margin-bottom: 1.75rem; padding: .35rem 0 1.2rem; }
  .cover::before { content: ""; position: absolute; left: 0; top: -.35rem; width: 5rem; height: .22rem;
                   background: linear-gradient(90deg, var(--fail), var(--partial), var(--pass)); }
  .cover h1 { margin: .12rem 0 .25rem; font-size: 2.8rem; line-height: 1.03; font-weight: 700; color: var(--ink); }
  .kicker { letter-spacing: .14em; text-transform: uppercase; color: var(--muted); font-size: .78rem; font-weight: 700; }
  .cover .meta { align-self: end; justify-self: end; max-width: 22rem; color: var(--muted);
                 font-size: .82rem; text-align: right; line-height: 1.6; }

  h2 { color: var(--ink); font-size: 1.55rem; font-weight: 700; margin: 2rem 0 .7rem;
       padding-bottom: .35rem; border-bottom: 1px solid var(--rule); }
  h3 { color: var(--ink); font-size: 1.24rem; font-weight: 700; margin: 0 0 .35rem; }
  p { margin: .55rem 0; }
  strong { color: var(--ink); }

  .key-takeaway { position: relative; margin: .8rem 0 1rem; padding: 1rem 1.15rem 1rem 1.35rem;
                  border: 1px solid var(--rule); border-left: .28rem solid var(--ink);
                  background: linear-gradient(180deg, #FFFFFF, #F8FAFC); color: var(--ink);
                  font-size: 1.06rem; font-weight: 600; }
  .kt-label { display: block; font-size: .72rem; font-weight: 700; letter-spacing: .14em;
              text-transform: uppercase; color: var(--muted); margin-bottom: .22rem; }
  .subhead { font-weight: 700; color: var(--ink); margin: .9rem 0 .2rem; }

  .score-grid { display: grid; grid-template-columns: repeat(6, minmax(0, 1fr)); gap: .7rem;
                margin: 1.25rem 0 1.5rem; }
  .score-card { min-height: 7.4rem; padding: .8rem .75rem; border: 1px solid var(--rule);
                border-top: .28rem solid var(--rule-strong); background: #fff; color: var(--body);
                font-weight: 400; display: flex; flex-direction: column; gap: .28rem; }
  .score-card.result-pass { border-top-color: var(--pass); background: var(--pass-bg); color: var(--body); font-weight: 400; }
  .score-card.result-partial { border-top-color: var(--partial); background: var(--partial-bg); color: var(--body); font-weight: 400; }
  .score-card.result-fail { border-top-color: var(--fail); background: var(--fail-bg); color: var(--body); font-weight: 400; }
  .score-card.result-insufficient { border-top-color: var(--insufficient); background: var(--insufficient-bg); color: var(--body); font-weight: 400; }
  .score-label { color: var(--ink); font-size: .8rem; font-weight: 700; letter-spacing: .08em; }
  .score-focus { flex: 1; color: var(--body); font-size: .78rem; line-height: 1.3; }
  .score-result { font-size: .86rem; font-weight: 700; }
  .score-card.result-pass .score-result { color: var(--pass); }
  .score-card.result-partial .score-result { color: var(--partial); }
  .score-card.result-fail .score-result { color: var(--fail); }
  .score-card.result-insufficient .score-result { color: var(--insufficient); }

  table { border-collapse: separate; border-spacing: 0; width: 100%; margin: 1rem 0 1.25rem; font-size: .9rem;
          border: 1px solid var(--rule); }
  th, td { border-right: 1px solid var(--rule); border-bottom: 1px solid var(--rule);
           padding: .62rem .72rem; text-align: left; vertical-align: top; }
  th:last-child, td:last-child { border-right: 0; }
  tr:last-child td { border-bottom: 0; }
  th { background: var(--header-bg); color: var(--ink); font-weight: 700; font-size: .8rem;
       letter-spacing: .04em; text-transform: uppercase; }
  tr:nth-child(even) td { background: #FAFCFE; }

  .dimension-card { margin: 1rem 0; padding: 1.05rem 1.1rem 1rem; border: 1px solid var(--rule);
                    border-left: .28rem solid var(--rule-strong); background: #fff; break-inside: avoid; }
  .dimension-card.result-pass { border-left-color: var(--pass); }
  .dimension-card.result-partial { border-left-color: var(--partial); }
  .dimension-card.result-fail { border-left-color: var(--fail); }
  .dimension-card.result-insufficient { border-left-color: var(--insufficient); }
  .evidence-meta { display: flex; flex-wrap: wrap; gap: .5rem; margin: .4rem 0 .75rem; color: var(--muted); }
  .evidence-meta span { border: 1px solid var(--rule); background: var(--canvas); padding: .18rem .45rem; font-size: .76rem; }
  .evidence-list { color: var(--muted); }

  .result-pass { color: var(--pass); font-weight: 700; }
  .result-partial { color: var(--partial); font-weight: 700; }
  .result-fail { color: var(--fail); font-weight: 700; }
  .result-insufficient { color: var(--insufficient); font-weight: 700; }
  .gain { color: var(--pass); font-weight: 700; }
  .giveup { color: var(--fail); font-weight: 700; }

  ul, ol { margin: .4rem 0 .85rem; padding-left: 1.35rem; font-size: .92rem; }
  li { margin: .25rem 0; }

  .footer { margin-top: 2.5rem; border-top: 1px solid var(--rule); padding-top: .8rem;
            color: var(--muted); font-size: .78rem; }

  @media (max-width: 860px) {
    body { padding: 0; }
    .report-shell { border: 0; box-shadow: none; padding: 1.4rem; }
    .cover { grid-template-columns: 1fr; gap: .5rem; }
    .cover .meta { justify-self: start; text-align: left; }
    .score-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }
  @media print {
    body { padding: 0; background: #fff; }
    .report-shell { max-width: none; border: 0; box-shadow: none; padding: 0; }
    .score-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    a { color: inherit; text-decoration: none; }
  }
</style>
</head>
<body>
  <main class="report-shell">
    <div class="cover">
      <div>
        <div class="kicker">Vendor Evaluation Report</div>
        <h1>{{VENDOR}}</h1>
      </div>
      <div class="meta">{{CATEGORY}}<br>{{VERSION}}<br>{{DATE}}</div>
    </div>
    {{BODY}}
    <div class="footer">CONFIDENTIAL — FOR INTERNAL USE ONLY · This evaluation assesses vendors on immediate utility and long-term organizational AI capacity building · {{VERSION}}</div>
  </main>
</body>
</html>
